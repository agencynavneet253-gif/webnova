<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | WEBNOVA</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{

margin:0;

font-family:'Poppins',sans-serif;

background:linear-gradient(135deg,#08111f,#111827);

display:flex;

justify-content:center;

align-items:center;

height:100vh;

overflow:hidden;

}

.login-container{

width:100%;

max-width:430px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.1);

border-radius:20px;

padding:40px;

box-shadow:0 20px 50px rgba(0,0,0,.45);

animation:fadeIn .8s ease;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.logo{

text-align:center;

font-size:36px;

font-weight:700;

color:#4f8cff;

margin-bottom:10px;

}

.login-container h2{

text-align:center;

margin-bottom:10px;

color:#fff;

}

.subtitle{

text-align:center;

color:#b8c2d6;

margin-bottom:30px;

font-size:15px;

}

.form-group{

margin-bottom:20px;

}

label{

display:block;

margin-bottom:8px;

font-weight:500;

color:white;

}

input{

width:100%;

padding:15px;

border:none;

outline:none;

border-radius:10px;

background:#1a2435;

color:white;

font-size:15px;

}

input::placeholder{

color:#9ca3af;

}

.login-btn{

width:100%;

padding:15px;

border:none;

border-radius:10px;

background:#2563eb;

color:white;

font-size:17px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

.login-btn:hover{

background:#1d4ed8;

}

.options{

display:flex;

justify-content:space-between;

margin-top:15px;

font-size:14px;

}

.options a{

color:#4f8cff;

text-decoration:none;

}

.options a:hover{

text-decoration:underline;

}

</style>

</head>

<body>

<div class="login-container">

<div class="logo">

WEBNOVA

</div>

<h2>Welcome Back</h2>

<p class="subtitle">

Sign in to manage your bookings and projects.

</p>

<form id="loginForm">

<div class="form-group">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

</div>

<div class="form-group">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter your password"
required>

</div>

<button
type="submit"
class="login-btn">

Login

</button>

<div class="options">

<a href="#" id="forgotPassword">

Forgot Password?

</a>

<a href="#" id="showSignup">

Create Account

</a>

</div>

</form>

<!-- PART 2 STARTS HERE --><!-- ========================= -->
<!-- SIGN UP PANEL -->
<!-- ========================= -->

<div id="signupSection" style="display:none; margin-top:40px;">

<h2 style="text-align:center;">Create Account</h2>

<p class="subtitle">

Join WEBNOVA and start your project.

</p>

<form id="signupForm">

<div class="form-group">

<label>Full Name</label>

<input
type="text"
id="signupName"
placeholder="Enter your full name"
required>

</div>

<div class="form-group">

<label>Email Address</label>

<input
type="email"
id="signupEmail"
placeholder="Enter your email"
required>

</div>

<div class="form-group">

<label>Password</label>

<input
type="password"
id="signupPassword"
placeholder="Create password"
required>

</div>

<button
type="submit"
class="login-btn">

Create Account

</button>

</form>

</div>

<!-- ========================= -->
<!-- GOOGLE LOGIN -->
<!-- ========================= -->

<div style="margin-top:30px;text-align:center;">

<p style="color:#b8c2d6;margin-bottom:15px;">

or continue with

</p>

<button
id="googleLogin"
class="login-btn"
style="background:#ffffff;color:#111;">

Continue with Google

</button>

</div>

<p style="text-align:center;color:#9ca3af;margin-top:30px;">

© 2026 WEBNOVA

</p>

</div>

<script>

const signupBtn=document.getElementById("showSignup");

const signupSection=document.getElementById("signupSection");

signupBtn.onclick=function(e){

e.preventDefault();

signupSection.style.display="block";

window.scrollTo({

top:document.body.scrollHeight,

behavior:"smooth"

});

};

document.getElementById("forgotPassword").onclick=function(e){

e.preventDefault();

const email=document.getElementById("email").value;

if(email===""){

alert("Please enter your email first.");

}else{

alert("Password reset link will be sent to: "+email);

}

};

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

alert("Login successful (Firebase will be connected later).");

});

document.getElementById("signupForm").addEventListener("submit",function(e){

e.preventDefault();

alert("Account created successfully (Firebase will be connected later).");

});

document.getElementById("googleLogin").onclick=function(){

alert("Google Sign-In will be connected with Firebase.");

};

</script>

</body>

</html>
